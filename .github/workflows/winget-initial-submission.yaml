---
# One-time workflow to submit the initial NavigatorCLI package to
# microsoft/winget-pkgs. Run this manually ONCE after the first GitHub
# Release that includes a Windows ZIP has been created.
#
# After the package is accepted by Microsoft (1-3 days), subsequent
# daily releases will auto-update via the build-windows job in
# daily-release.yaml using `wingetcreate update`.
#
# Required secret: HOMEBREW_TAP_TOKEN (classic PAT, public_repo scope)
name: Submit Initial winget Manifest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to submit (e.g. 2026.03.03)"
        required: true
        type: string

jobs:
  submit:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Install wingetcreate
        shell: pwsh
        run: dotnet tool install --global wingetcreate

      - name: Submit initial manifest to winget-pkgs
        shell: pwsh
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          $version = "${{ inputs.version }}"
          $zipUrl = "https://github.com/neon-law-foundation/Navigator/releases/download/v${version}/navigator-${version}-windows-x86_64.zip"

          Write-Host "Submitting initial winget manifest for v$version"
          Write-Host "ZIP URL: $zipUrl"

          wingetcreate new $zipUrl `
            --id neon-law-foundation.NavigatorCLI `
            --name "Navigator CLI" `
            --publisher "Neon Law Foundation" `
            --version "$version" `
            --token "$env:HOMEBREW_TAP_TOKEN" `
            --submit
